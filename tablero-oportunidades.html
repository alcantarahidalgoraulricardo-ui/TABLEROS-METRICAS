<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline de Oportunidades — Parsons CNC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #080812;
      --bg-card:    #0f0f22;
      --bg-head:    #0b0b1e;
      --border:     #1a1a38;
      --border-hi:  #2a2a52;
      --text-1:     #e8e8ff;
      --text-2:     #7070a0;
      --text-dim:   #363660;
      --hot:        #ff4d4d;
      --hot-glow:   rgba(255,77,77,.3);
      --warm:       #ffbe00;
      --warm-glow:  rgba(255,190,0,.25);
      --accent:     #4fc3f7;
      --green:      #00e676;
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-1);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      flex-direction: column;
      /* zoom: 1.4 agranda 40% — se compensan ancho y alto para llenar exactamente el viewport */
      zoom: 1.4;
      width: calc(100vw / 1.4);
      height: calc(100vh / 1.4);
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      flex-shrink: 0;
      background: var(--bg-head);
      border-bottom: 1px solid var(--border-hi);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .brand-sub {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-2);
      margin-top: 4px;
    }

    .clock-time {
      font-size: 40px;
      font-weight: 200;
      color: var(--text-1);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      line-height: 1;
      text-align: right;
    }

    .clock-date {
      font-size: 11px;
      color: var(--text-2);
      text-align: right;
      margin-top: 5px;
      letter-spacing: 1px;
      text-transform: capitalize;
    }

    /* ─── SUMMARY BAR ─── */
    .summary {
      flex-shrink: 0;
      background: #09091a;
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 32px;
    }

    .summary-stats {
      display: flex;
      gap: 48px;
      flex-shrink: 0;
    }

    .summary-divider {
      width: 1px;
      align-self: stretch;
      background: var(--border-hi);
      flex-shrink: 0;
    }

    .summary-forecast {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .forecast-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-2);
    }

    .month-chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    .month-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 14px;
      text-align: center;
      min-width: 70px;
    }

    .month-chip-dim { opacity: .55; }

    .month-chip-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-2);
      margin-bottom: 1px;
      white-space: nowrap;
    }

    .month-chip-total {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-1);
      font-variant-numeric: tabular-nums;
    }

    .month-chip-split {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-top: 1px;
    }

    .month-chip-split .mh { color: var(--hot); }
    .month-chip-split .mw { color: var(--warm); }
    .month-chip-split .sep { color: var(--text-dim); margin: 0 3px; }

    .month-empty {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sd-hot   { background: var(--hot);    box-shadow: 0 0 12px var(--hot-glow); }
    .sd-warm  { background: var(--warm);   box-shadow: 0 0 12px var(--warm-glow); }
    .sd-total { background: var(--accent); box-shadow: 0 0 12px rgba(79,195,247,.35); }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-2);
      margin-bottom: 3px;
    }

    .stat-val {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .sv-hot   { color: var(--hot); }
    .sv-warm  { color: var(--warm); }
    .sv-total { color: var(--accent); }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-content: start;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeUp .35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-head {
      background: linear-gradient(135deg, #13132e 0%, #101026 100%);
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .vendor-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-1);
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .badge-hot  { background: rgba(255,77,77,.12);  border: 1px solid var(--hot);  color: var(--hot); }
    .badge-warm { background: rgba(255,190,0,.1);   border: 1px solid var(--warm); color: var(--warm); }

    /* ─── CLIENT ROWS ─── */
    .client-list { flex: 1; }

    .client-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(26,26,56,.9);
    }

    .client-row:last-child { border-bottom: none; }

    .row-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-hot  { background: var(--hot);  box-shadow: 0 0 7px var(--hot-glow); }
    .dot-warm { background: var(--warm); box-shadow: 0 0 7px var(--warm-glow); }

    .client-info { flex: 1; min-width: 0; }

    .client-name {
      font-size: 13px;
      font-weight: 500;
      color: #d0d0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-product {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-fc {
      font-size: 10px;
      color: var(--accent);
      margin-top: 2px;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-tag {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      flex-shrink: 0;
    }

    .tag-hot  { color: var(--hot); }
    .tag-warm { color: var(--warm); }

    .row-right { flex-shrink: 0; text-align: right; }

    .lead-monto {
      font-size: 11px;
      font-weight: 800;
      color: var(--green);
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .stat-money {
      font-size: 14px;
      font-weight: 700;
      color: var(--green);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    .month-chip-money {
      font-size: 11px;
      font-weight: 800;
      color: var(--green);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .card-empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* ─── LOADING / ERROR ─── */
    .loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      grid-column: 1 / -1;
    }

    .error-bar {
      display: none;
      flex-shrink: 0;
      background: rgba(255,77,77,.08);
      border-top: 1px solid rgba(255,77,77,.4);
      padding: 8px 32px;
      text-align: center;
      font-size: 12px;
      color: #ff8a80;
      letter-spacing: 1px;
    }

    /* ─── FOOTER ─── */
    .footer {
      flex-shrink: 0;
      background: var(--bg-head);
      border-top: 1px solid var(--border);
      padding: 9px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .footer-live {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(0,230,118,0); }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- HEADER -->
  <header class="header">
    <div>
      <div class="brand-title">¡Llevando negocios al siguiente nivel!</div>
      <div class="brand-sub">Parsons CNC &middot; Seguimiento Comercial</div>
    </div>
    <div>
      <div class="clock-time" id="clockTime">--:--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
  </header>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-stats">
      <div class="stat">
        <div class="stat-dot sd-hot"></div>
        <div>
          <div class="stat-label">Calientes</div>
          <div class="stat-val sv-hot" id="totalHot">—</div>
          <div class="stat-money" id="moneyHot">—</div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-dot sd-warm"></div>
        <div>
          <div class="stat-label">Tibias</div>
          <div class="stat-val sv-warm" id="totalWarm">—</div>
          <div class="stat-money" id="moneyWarm">—</div>
        </div>
      </div>
      <div class="stat">
        <div class="stat-dot sd-total"></div>
        <div>
          <div class="stat-label">Total</div>
          <div class="stat-val sv-total" id="totalAll">—</div>
          <div class="stat-money" id="moneyAll">—</div>
        </div>
      </div>
    </div>

    <div class="summary-divider"></div>

    <div class="summary-forecast">
      <div class="forecast-title">Pronóstico de cierre por mes</div>
      <div class="month-chips" id="monthForecast">
        <div class="month-empty">Cargando&hellip;</div>
      </div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <main class="main">
    <div class="grid" id="grid">
      <div class="loading-msg">Cargando datos&hellip;</div>
    </div>
  </main>

  <!-- ERROR BAR -->
  <div class="error-bar" id="errorBar">
    &#9888; No se pudo conectar al sheet. Reintentando en <span id="errorCD">60</span>s&hellip;
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-live">
      <div class="live-dot"></div>
      <span>EN VIVO &nbsp;&middot;&nbsp; Última actualización: <strong id="lastUpdate">—</strong></span>
    </div>
    <span>Próxima actualización en <strong id="countdown">60</strong>s</span>
  </footer>

</div>

<script>
(function () {
  'use strict';

  const CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQYvDuMPkNWnvsJtwlxEutaojZoy2cm95zDVWhodSoH52e2FFJUN384jfohBVUdLA/pub?gid=466059784&single=true&output=csv';
  const INTERVAL = 60; // segundos entre actualizaciones

  let cdVal = INTERVAL;

  /* ── Parser de CSV (maneja campos entre comillas) ── */
  function parseLine(line) {
    const out = [];
    let cell = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"')            { inQ = !inQ; }
      else if (c === ',' && !inQ) { out.push(cell.trim()); cell = ''; }
      else                      { cell += c; }
    }
    out.push(cell.trim());
    return out;
  }

  function parseCSV(text) {
    return text.replace(/\r/g, '').split('\n')
      .filter(l => l.trim())
      .map(parseLine);
  }

  /* ── Construir estructura de vendedores desde las filas ── */
  function buildVendors(rows) {
    if (rows.length < 2) return [];
    // El sheet tiene filas vacías al inicio — buscar la primera fila no vacía
    const headerIndex = rows.findIndex(row => row.some(cell => cell.trim() !== ''));
    if (headerIndex === -1 || headerIndex >= rows.length - 1) return [];
    const header = rows[headerIndex];
    const data   = rows.slice(headerIndex + 1);
    const vendors = [];

    for (let col = 0; col < header.length; col += 5) {
      const name = (header[col] || '').trim();
      if (!name || name === '.' || name === '-') continue;

      const vendor = { name, clients: [] };
      data.forEach(row => {
        const client  = (row[col]     || '').trim();
        const product = (row[col + 1] || '').trim();
        const rating  = parseInt((row[col + 2] || '').trim(), 10);
        const monto   = parseMonto(row[col + 3] || '');
        const fc      = (row[col + 4] || '').trim();
        if (client && (rating === 1 || rating === 2)) {
          vendor.clients.push({ client, product, rating, fc, monto });
        }
      });
      vendors.push(vendor);
    }
    return vendors;
  }

  /* ── Escape HTML ── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Convertir el texto de monto a número (acepta $, comas, y sufijos k/m) ── */
  function parseMonto(raw) {
    const s = String(raw).trim().toLowerCase().replace(/[$,\s]/g, '');
    if (!s) return 0;
    const m = s.match(/^([0-9.]+)\s*([km])?/);
    if (!m) return 0;
    let n = parseFloat(m[1]);
    if (isNaN(n)) return 0;
    if (m[2] === 'k') n *= 1e3;
    else if (m[2] === 'm') n *= 1e6;
    return n;
  }

  /* ── Formatear monto abreviado: $5.2M / $850K / $0 ── */
  function fmtMoney(n) {
    if (!n) return '$0';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';
    return '$' + Math.round(n);
  }

  /* ── Normalizar el mes de cierre (F.C.) a un nombre canónico ── */
  const MONTH_ORDER = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO',
                       'AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

  function monthKey(raw) {
    const s = raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
    if (!s) return null;
    let idx = MONTH_ORDER.indexOf(s);
    if (idx === -1) idx = MONTH_ORDER.findIndex(m => m.startsWith(s.slice(0, 3)));
    return idx === -1 ? { label: s, order: 99 } : { label: MONTH_ORDER[idx], order: idx };
  }

  /* ── Agrupar oportunidades por mes de cierre ── */
  function buildForecast(vendors) {
    const map = new Map();
    const sinFecha = { hot: 0, warm: 0, monto: 0 };
    vendors.forEach(v => v.clients.forEach(c => {
      const mk = c.fc ? monthKey(c.fc) : null;
      if (!mk) {
        c.rating === 1 ? sinFecha.hot++ : sinFecha.warm++;
        sinFecha.monto += c.monto || 0;
        return;
      }
      if (!map.has(mk.label)) map.set(mk.label, { label: mk.label, order: mk.order, hot: 0, warm: 0, monto: 0 });
      const e = map.get(mk.label);
      c.rating === 1 ? e.hot++ : e.warm++;
      e.monto += c.monto || 0;
    }));
    const months = [...map.values()].sort((a, b) => a.order - b.order || a.label.localeCompare(b.label));
    return { months, sinFecha };
  }

  function chipHTML(label, hot, warm, monto, dim) {
    return `
      <div class="month-chip${dim ? ' month-chip-dim' : ''}">
        <div class="month-chip-label">${esc(label)}</div>
        <div class="month-chip-total">${hot + warm}</div>
        <div class="month-chip-split"><span class="mh">${hot}</span><span class="sep">·</span><span class="mw">${warm}</span></div>
        <div class="month-chip-money">${fmtMoney(monto)}</div>
      </div>`;
  }

  function renderForecast(vendors) {
    const { months, sinFecha } = buildForecast(vendors);
    const chips = months.map(m => chipHTML(m.label, m.hot, m.warm, m.monto));
    if (sinFecha.hot + sinFecha.warm > 0) chips.push(chipHTML('Sin fecha', sinFecha.hot, sinFecha.warm, sinFecha.monto, true));
    document.getElementById('monthForecast').innerHTML =
      chips.length ? chips.join('') : '<div class="month-empty">Sin fechas de cierre registradas</div>';
  }

  /* ── Renderizar tarjetas ── */
  function render(vendors) {
    let hot = 0, warm = 0, hotMoney = 0, warmMoney = 0;
    vendors.forEach(v => v.clients.forEach(c => {
      if (c.rating === 1) { hot++;  hotMoney  += c.monto || 0; }
      else                { warm++; warmMoney += c.monto || 0; }
    }));

    document.getElementById('totalHot').textContent  = hot;
    document.getElementById('totalWarm').textContent = warm;
    document.getElementById('totalAll').textContent  = hot + warm;

    document.getElementById('moneyHot').textContent  = fmtMoney(hotMoney);
    document.getElementById('moneyWarm').textContent = fmtMoney(warmMoney);
    document.getElementById('moneyAll').textContent  = fmtMoney(hotMoney + warmMoney);

    renderForecast(vendors);

    const grid = document.getElementById('grid');
    if (!vendors.length) {
      grid.innerHTML = '<div class="loading-msg">Sin datos disponibles</div>';
      return;
    }

    grid.innerHTML = vendors.map(v => {
      const hotC  = v.clients.filter(c => c.rating === 1);
      const warmC = v.clients.filter(c => c.rating === 2);
      const sorted = [...hotC, ...warmC]; // calientes primero

      const badges = [
        hotC.length  ? `<span class="badge badge-hot">${hotC.length} CALIENTE${hotC.length > 1 ? 'S' : ''}</span>`  : '',
        warmC.length ? `<span class="badge badge-warm">${warmC.length} TIBIA${warmC.length > 1 ? 'S' : ''}</span>` : '',
      ].join('');

      const rows = sorted.length
        ? sorted.map(c => `
            <div class="client-row">
              <div class="row-dot ${c.rating === 1 ? 'dot-hot' : 'dot-warm'}"></div>
              <div class="client-info">
                <div class="client-name">${esc(c.client)}</div>
                ${c.product ? `<div class="client-product">${esc(c.product)}</div>` : ''}
                ${c.fc ? `<div class="client-fc">&#128197; Cierre: ${esc(c.fc)}</div>` : ''}
              </div>
              <div class="row-right">
                <span class="row-tag ${c.rating === 1 ? 'tag-hot' : 'tag-warm'}">${c.rating === 1 ? 'CALIENTE' : 'TIBIA'}</span>
                ${c.monto ? `<div class="lead-monto">${fmtMoney(c.monto)}</div>` : ''}
              </div>
            </div>`).join('')
        : '<div class="card-empty">Sin oportunidades registradas</div>';

      return `
        <div class="card">
          <div class="card-head">
            <div class="vendor-name">${esc(v.name)}</div>
            <div class="badges">${badges}</div>
          </div>
          <div class="client-list">${rows}</div>
        </div>`;
    }).join('');
  }

  /* ── Fetch y actualización ── */
  async function refresh() {
    try {
      const res  = await fetch(`${CSV_URL}&_t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const vendors = buildVendors(parseCSV(text));
      render(vendors);
      document.getElementById('lastUpdate').textContent =
        new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('errorBar').style.display = 'none';
    } catch (err) {
      console.error('[tablero] Error al cargar datos:', err);
      document.getElementById('errorBar').style.display = 'block';
    }
    cdVal = INTERVAL;
  }

  /* ── Reloj ── */
  function tick() {
    const now = new Date();
    document.getElementById('clockTime').textContent =
      now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('clockDate').textContent =
      now.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  /* ── Contador regresivo ── */
  setInterval(() => {
    cdVal = Math.max(0, cdVal - 1);
    document.getElementById('countdown').textContent = cdVal;
    document.getElementById('errorCD').textContent   = cdVal;
  }, 1000);

  /* ── Iniciar ── */
  refresh();
  tick();
  setInterval(refresh, INTERVAL * 1000);
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
