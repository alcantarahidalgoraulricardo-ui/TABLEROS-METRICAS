<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC Pedidos Tracker — Parsons CNC</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  /* ── Barra de progreso: 4 segmentos coloreados por estado de deadline ── */
  .progress-track {
    position: relative;
    height: 28px;
    background: transparent;
    border-radius: 999px;
    overflow: visible;
    display: flex;
    gap: 2px;
  }
  .phase-seg {
    position: relative;
    flex: 1 1 0;
    height: 100%;
    background: #475569;
    overflow: hidden;
    transition: background-color .6s;
  }
  .phase-seg:first-child { border-radius: 999px 0 0 999px; }
  .phase-seg:last-child  { border-radius: 0 999px 999px 0; }
  .phase-seg-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    background-size: 24px 24px;
    background-image: linear-gradient(45deg, rgba(255,255,255,.22) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.22) 50%, rgba(255,255,255,.22) 75%, transparent 75%, transparent);
    animation: stripes 1.5s linear infinite;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }
  .seg-green  { background: #16a34a; }
  .seg-yellow { background: #ca8a04; }
  .seg-red    { background: #dc2626; }
  .seg-gray   { background: #475569; }
  @keyframes stripes {
    from { background-position: 0 0; }
    to   { background-position: 30px 0; }
  }

  /* ── Paleta de colores por pedido (8 rotando) ── */
  .grad-0 { background-color: #2563eb; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #1d4ed8, #38bdf8); background-blend-mode: overlay; }
  .grad-1 { background-color: #7c3aed; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #6d28d9, #f472b6); background-blend-mode: overlay; }
  .grad-2 { background-color: #ea580c; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #c2410c, #fbbf24); background-blend-mode: overlay; }
  .grad-3 { background-color: #16a34a; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #15803d, #a3e635); background-blend-mode: overlay; }
  .grad-4 { background-color: #0891b2; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #0e7490, #5eead4); background-blend-mode: overlay; }
  .grad-5 { background-color: #db2777; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #be185d, #fda4af); background-blend-mode: overlay; }
  .grad-6 { background-color: #ca8a04; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #a16207, #fde047); background-blend-mode: overlay; }
  .grad-7 { background-color: #4f46e5; background-image: linear-gradient(45deg, rgba(255,255,255,.3) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.3) 50%, rgba(255,255,255,.3) 75%, transparent 75%, transparent), linear-gradient(90deg, #4338ca, #818cf8); background-blend-mode: overlay; }

  /* ── % dentro de la barra ── */
  .pct-label {
    position: absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    font-size: 16px; font-weight: 600; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
    z-index: 3;
    pointer-events: none;
  }

  /* ── Spinner (logo girando) ── */
  .spinner-icon {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    transition: left 1.2s cubic-bezier(.4,0,.2,1);
    animation: spin 2.2s linear infinite;
    z-index: 2;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.3));
  }
  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* ── Ícono de máquina flotante: SIN marco/caja, solo la imagen ── */
  .machine-icon {
    position: absolute;
    top: -66px;
    transform: translateX(-50%);
    width: 66px; height: 66px;
    display: flex; align-items: center; justify-content: center;
    transition: left 1.2s cubic-bezier(.4,0,.2,1);
    animation: machine-float 1.8s ease-in-out infinite;
    z-index: 3;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.35));
  }
  .machine-icon img {
    width: 100%; height: 100%; object-fit: contain;
  }
  .truck-photo { animation: truck-bounce .5s ease-in-out infinite; }
  @keyframes truck-bounce {
    0%, 100% { transform: translateY(0) scaleX(1); }
    50%      { transform: translateY(1px) scaleX(1.015); }
  }
  @keyframes machine-float {
    0%, 100% { margin-top: 0; }
    50% { margin-top: -5px; }
  }

  /* ── Ícono de camión (Fase 2: envío en curso) ── */
  .truck-wheel { animation: truck-spin .6s linear infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes truck-spin { to { transform: rotate(360deg); } }
  .truck-motion rect { animation: truck-motion .5s ease-in-out infinite; }
  @keyframes truck-motion {
    0%, 100% { opacity: .3; transform: translateX(2px); }
    50%      { opacity: .8; transform: translateX(-1px); }
  }

  /* ── Ícono SVG animado de máquina CNC (centro de maquinado vertical) ── */
  .machine-icon svg.cnc-svg { width: 100%; height: 100%; display: block; padding: 5px; }
  .cnc-head { animation: cnc-plunge 1.1s ease-in-out infinite; transform-box: fill-box; }
  @keyframes cnc-plunge {
    0%, 100% { transform: translateY(-1px); }
    50%      { transform: translateY(2.2px); }
  }
  .cnc-spark { animation: cnc-spark .45s steps(1,end) infinite; }
  @keyframes cnc-spark {
    0%, 100% { opacity: 0; }
    50%      { opacity: 1; }
  }
  /* Torre de estatus (luz verde parpadeando: máquina operando) */
  .cnc-light { animation: cnc-light 1.4s ease-in-out infinite; }
  @keyframes cnc-light {
    0%, 70%, 100% { opacity: 1; }
    85%           { opacity: .3; }
  }

  /* ── Marcadores de fase ── */
  .phase-marker {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: rgba(0,0,0,.10);
    z-index: 1;
    border-radius: 1px;
  }
  .phase-label {
    font-size: 12px; color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: .5px; font-weight: 500;
  }

  /* ── Tarjetas ── */
  .card { background: #1e293b; border: 1px solid #334155; }
  .kpi-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 5px 14px; display:flex; align-items:center; gap:8px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: #f1f5f9; line-height: 1; white-space:nowrap; }
  .kpi-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; line-height:1.2; }

  /* ── Visor vertical: carrusel infinito, SIN scroll de mouse.
     overflow:hidden bloquea que el usuario lo desplace con la rueda/touch;
     el JS sigue moviendo scrollTop por su cuenta (cuadro a cuadro, rAF)
     para que el recorrido fluya sin pasos. */
  .vslider-viewport {
    overflow: hidden;
    position: relative;
    flex: 1 1 0;
    min-height: 0;
    cursor: default;
  }
  .vslider-track {
    display: flex;
    flex-direction: column;
  }
  .vslider-item { flex-shrink: 0; }
</style>
</head>

<script>
// ─────────────────────────────────────────────────────────
//  CONFIGURACIÓN
// ─────────────────────────────────────────────────────────

// Sheet publicado como CSV. Publicar en Google Sheets:
//   Archivo → Compartir → Publicar en la web → CSV → Publicar
//   Luego reemplazar la URL con el enlace generado.
const CSV_URL =
  'https://docs.google.com/spreadsheets/d/1-NncOPwtQvpRQ83uINFImwNTZvkqy2bm7Dl9WeqY1i0/export?format=csv&gid=0';

// El índice real se detecta dinámicamente buscando la fila que contiene
// "PEDIDO" en col B (col 1), para no depender de cuántas filas vacías
// eliminó PapaParse con skipEmptyLines.

// Paleta de colores por pedido — 8 gradientes, rotación cíclica
const ORDER_PALETTE = [
  'grad-0','grad-1','grad-2','grad-3',
  'grad-4','grad-5','grad-6','grad-7'
];
const ORDER_COLORS = [
  '#1d4ed8','#7c3aed','#c2410c','#15803d',
  '#0e7490','#be185d','#a16207','#4338ca'
];

const PHASES = ['HERRAMIENTA + DOC','ENVÍO Y DESCARGA','PM Y CURSO','ENCUESTA'];

// Estado global del visor
let liveData     = [];
let VISIBLE_ROWS = 1;
let cardHeight   = 0;
let countdownVal = 120;

// Estado del auto-scroll continuo e infinito
let rafId            = null;
let lastFrameTs       = null;
let singleListHeight = 0;   // alto de UNA vuelta completa de tarjetas
let pxPerMs           = 0;   // velocidad de lectura calculada

// ─────────────────────────────────────────────────────────
//  PARSEO DEL CSV
// ─────────────────────────────────────────────────────────
function fetchData(onDone) {
  // Cache-bust con timestamp para que el navegador no use versión antigua
  const url = CSV_URL + '&_ts=' + Date.now();

  Papa.parse(url, {
    download: true,
    skipEmptyLines: true,
    complete(results) {
      const rows = results.data;
      const pedidos = [];
      const norm = s => (s || '').toString().trim().toUpperCase();

      // ── Detectar la fila de ENCABEZADOS de campo (la que contiene
      //    "VENDEDOR" + "PEDIDO"). Es la fila 7 del Sheet. La fila justo
      //    arriba es la de FASES/secciones, que usamos para desambiguar
      //    las columnas "STATUS" y "FECHA" que se repiten.
      let headerIdx = -1;
      for (let i = 0; i < rows.length; i++) {
        const joined = (rows[i] || []).map(norm).join('|');
        if (joined.includes('VENDEDOR') && joined.includes('PEDIDO')) { headerIdx = i; break; }
      }
      if (headerIdx < 0) { showStatus('No se encontró la fila de encabezados (VENDEDOR/PEDIDO) en el Sheet.'); return; }

      const headerRow  = (rows[headerIdx]     || []).map(norm);
      // Fila de secciones (FASES) con "forward-fill": cada celda vacía
      // hereda la etiqueta de fase anterior, para saber a qué fase
      // pertenece cada columna STATUS/FECHA.
      const rawSection = (rows[headerIdx - 1] || []).map(norm);
      const section = [];
      let lastSec = '';
      for (let c = 0; c < headerRow.length; c++) {
        if (rawSection[c]) lastSec = rawSection[c];
        section[c] = lastSec;
      }

      // ── Construir el mapa columna → campo, por NOMBRE + SECCIÓN.
      //    El Sheet tiene 4 fases; cada fase: DEADLINE + FECHA real + STATUS.
      //    "INFORMACIÓN DEL PEDIDO" lleva: # PEDIDO, CLIENTE, VENDEDOR, FECHA (alta), HERRAMIENTA.
      const COL = {};
      for (let c = 0; c < headerRow.length; c++) {
        const h = headerRow[c], sec = section[c];

        if      (h.includes('PEDIDO'))                          COL.id = c;
        else if (h.includes('CLIENTE') || h.includes('MAQUINA')) COL.cliente = c;
        else if (h.includes('VENDEDOR'))                        COL.vendedor = c;
        else if (h === 'HERRAMIENTA')                           COL.tipoHerr = c;   // SI/NO LLEVA
        else if (h.includes('RESULTADO'))                       COL.encuesta = c;
        else if (h === 'FECHA' && !sec)                         COL.fecha = c;      // FECHA de alta del pedido
        // Fase 1 — HERAMIENTA + DOC
        else if (sec.includes('HERAM') || sec.includes('HERRAM')) {
          if      (h === 'DEADLINE')        COL.deadlineF1 = c;
          else if (h.includes('FECHA'))     COL.fechaF1    = c;
          else if (h === 'STATUS')          COL.statusF1   = c;
        }
        // Fase 2 — ENVÍO
        else if (sec.includes('ENV')) {
          if      (h === 'DEADLINE')        COL.deadlineF2 = c;
          else if (h.includes('FECHA'))     COL.fechaF2    = c; // fecha de entrega
          else if (h === 'STATUS')          COL.envio      = c;
        }
        // Fase 3 — PM Y CURSO
        else if (sec.includes('PM')) {
          if      (h === 'DEADLINE')        COL.deadlineF3 = c;
          else if (h.includes('FECHA'))     COL.fechaF3    = c; // fecha programada
          else if (h === 'STATUS')          COL.pm         = c;
        }
        // Fase 4 — ENCUESTA
        else if (sec.includes('ENCUESTA')) {
          if      (h === 'DEADLINE')        COL.deadlineF4 = c;
          else if (h.includes('FECHA'))     COL.fechaF4    = c;
        }
      }

      const cell = (r, key) => (COL[key] !== undefined && r[COL[key]] != null)
        ? r[COL[key]].toString().trim() : '';

      for (let i = headerIdx + 1; i < rows.length; i++) {
        const r = rows[i];
        const id = cell(r, 'id');
        if (!id || !/^\d+$/.test(id)) continue;

        pedidos.push({
          id,
          cliente:    cell(r, 'cliente'),
          vendedor:   cell(r, 'vendedor'),
          fecha:      cell(r, 'fecha'),
          tipoHerr:   cell(r, 'tipoHerr').toUpperCase(),
          // Fase 1
          statusF1:   cell(r, 'statusF1').toUpperCase(),
          deadlineF1: cell(r, 'deadlineF1'),
          fechaF1:    cell(r, 'fechaF1'),
          // Fase 2
          envio:      cell(r, 'envio').toUpperCase(),
          deadlineF2: cell(r, 'deadlineF2'),
          fechaF2:    cell(r, 'fechaF2'),
          // Fase 3
          pm:         cell(r, 'pm').toUpperCase(),
          deadlineF3: cell(r, 'deadlineF3'),
          fechaF3:    cell(r, 'fechaF3'),
          // Fase 4
          encuesta:   cell(r, 'encuesta').toUpperCase(),
          deadlineF4: cell(r, 'deadlineF4'),
          fechaF4:    cell(r, 'fechaF4'),
        });
      }
      onDone(pedidos);
    },
    error(err) {
      showStatus('Error al cargar datos: ' + err.message);
    }
  });
}

// ─────────────────────────────────────────────────────────
//  PARSING DE FECHAS Y ESTADO DE DEADLINE
// ─────────────────────────────────────────────────────────
function parseDate(str) {
  if (!str) return null;
  const m = str.toString().trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return null;
  let d = parseInt(m[1], 10), mo = parseInt(m[2], 10), y = parseInt(m[3], 10);
  if (isNaN(d) || isNaN(mo) || isNaN(y)) return null;
  if (y < 100) y += 2000;
  return new Date(y, mo - 1, d);
}

// La columna FECHA de PM y curso a veces guarda un rango ("29/6 - 6/07")
// sin año. Tomamos la fecha final del rango como "fecha en que se realizó",
// usando el año del pedido (columna FECHA de alta) como referencia.
function parseRangeEndDate(str, fallbackYear) {
  if (!str) return null;
  const last = str.toString().split('-').pop().trim();
  const m = last.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if (m) {
    const d = parseInt(m[1], 10), mo = parseInt(m[2], 10);
    if (isNaN(d) || isNaN(mo)) return null;
    return new Date(fallbackYear, mo - 1, d);
  }
  return parseDate(last); // por si viene con año completo
}

function phaseDone(p, n) {
  if (n === 1) return p.statusF1 === 'TERMINADO';
  if (n === 2) return p.envio === 'ENTREGADO';
  if (n === 3) return p.pm === 'REALIZADO' || p.pm === 'TERMINADO' || p.pm === 'COMPLETADO';
  if (n === 4) return !!(p.encuesta && p.encuesta !== 'PENDIENTE' && p.encuesta !== '-');
  return false;
}

// Fecha en que se completó cada fase (para deadline automático de Fase 4 y auto-ocultar)
function phaseDoneDate(p, n) {
  if (n === 3) {
    const altaYear = (parseDate(p.fecha) || new Date()).getFullYear();
    return parseRangeEndDate(p.fechaF3, altaYear);
  }
  if (n === 4) return parseDate(p.fechaF4);
  return null;
}

// Fecha de cierre real de un pedido para el auto-ocultado (Panel "3 días
// después"). Si el Sheet no trae una fecha válida en FECHA de Encuesta
// (vacía, "-", etc.), en vez de dejarlo visible para siempre, el tablero
// recuerda en este navegador el primer día que lo detectó completo y
// cuenta los 3 días desde ahí.
function getClosedDate(p, today) {
  const real = parseDate(p.fechaF4);
  if (real) return real;

  const key = 'pedidoCerrado_' + p.id;
  try {
    const saved = localStorage.getItem(key);
    if (saved) return new Date(saved);
    localStorage.setItem(key, today.toISOString());
  } catch (e) { /* localStorage no disponible: se comporta como antes */ }
  return today;
}

// Deadline automático de Fase 4 (Encuesta): 3 días después de que PM y curso se realizó.
// Se calcula en JS, ignorando cualquier deadline manual del Sheet.
function encuestaDeadline(p) {
  // Prioridad: deadline manual del Sheet (columna DEADLINE de Encuesta).
  // El Sheet ya lo está llenando con la fecha real acordada por el negocio.
  const manual = parseDate(p.deadlineF4);
  if (manual) return manual;
  // Fallback automático (solo si el Sheet aún no tiene deadline capturado):
  // 3 días después de que PM y curso se realizó.
  const donePM = phaseDoneDate(p, 3);
  if (!donePM) return null;
  const d = new Date(donePM);
  d.setDate(d.getDate() + 3);
  return d;
}

// Fase 2 (ENVÍO) y Fase 3 (PM): estatus intermedios → 0/50/75/100.
// SIN ENVIAR / SIN PROGRAMAR → 0 · PROGRAMADO → 50 · EN TRÁNSITO/EN PROCESO → 75 · ENTREGADO/REALIZADO → 100
function statusFillPct(status) {
  if (status === 'ENTREGADO' || status === 'REALIZADO' || status === 'TERMINADO' || status === 'COMPLETADO') return 100;
  if (status === 'EN TRÁNSITO' || status === 'EN TRANSITO' || status === 'EN PROCESO') return 75;
  if (status === 'PROGRAMADO') return 50;
  return 0; // SIN ENVIAR / SIN PROGRAMAR / vacío
}

// Fase 2 (Envío) y Fase 3 (PM): la CAJA del segmento siempre queda gris; solo el
// AVANCE logrado (fill%) se pinta — verde mientras esté dentro de plazo, y si el
// deadline se cumple sin completar la fase, la caja entera pasa a rojo (fill 100%).
function segment23Info(p, n, today) {
  if (phaseDone(p, n)) return { fill: 100, color: '#16a34a' }; // completada
  const deadline = parseDate(p['deadlineF' + n]);
  if (deadline && today > deadline) return { fill: 100, color: '#dc2626' }; // vencida
  const status = (n === 2) ? p.envio : p.pm;
  return { fill: statusFillPct(status), color: '#16a34a' }; // en progreso, verde
}

// Fase 4 (Encuesta): SOLO se activa cuando PM y curso ya está REALIZADO.
// Si PM aún no termina → gris vacío (0%).
// Una vez activa: amarillo al 50% mientras está pendiente; rojo si pasan los
// 3 días automáticos desde que PM y curso se realizó; verde si ya hay resultado.
function segment4Info(p, today) {
  if (phaseDone(p, 4)) return { fill: 100, color: '#16a34a' };
  if (!phaseDone(p, 3)) return { fill: 0, color: '#64748b' }; // PM no realizado → inactiva
  const deadline = encuestaDeadline(p);
  if (deadline && today > deadline) return { fill: 100, color: '#dc2626' };
  return { fill: 50, color: '#eab308' };
}

// Fecha corta dd/mm a partir de un objeto Date
function fmtDate(d) {
  if (!d) return '';
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}
// Limpia valores no-fecha ("NA", "N/A", "-", vacío)
function cleanDate(s) {
  if (!s) return '';
  const t = s.toString().trim();
  if (!t || /^N\/?A$/i.test(t) || t === '-') return '';
  return t;
}
// Etiqueta de fecha en el extremo derecho de cada segmento:
//   fase completada → fecha real del Sheet (terminado/entregado/programado/encuesta), verde;
//   pendiente → deadline de la fase (rojo si ya venció, gris si aún en plazo);
//   Fase 4 sin PM realizado → sin etiqueta (inactiva).
function phaseTag(p, n, today) {
  if (phaseDone(p, n)) {
    const actual = n === 1 ? p.fechaF1 : n === 2 ? p.fechaF2 : n === 3 ? p.fechaF3 : p.fechaF4;
    return { text: cleanDate(actual), color: '#22c55e' };
  }
  if (n === 4) {
    if (!phaseDone(p, 3)) return { text: '', color: '' };
    const d = encuestaDeadline(p);
    return { text: d ? fmtDate(d) : '', color: (d && today > d) ? '#f87171' : '#94a3b8' };
  }
  const dlDate = parseDate(p['deadlineF' + n]);
  return { text: cleanDate(p['deadlineF' + n]), color: (dlDate && today > dlDate) ? '#f87171' : '#94a3b8' };
}

// ─────────────────────────────────────────────────────────
//  FASE 1 — avance por TIEMPO (días desde alta hasta deadline)
//  El spinner avanza cada día. El color del avance logrado:
//   0–50% tiempo → verde · 50–75% → degradado verde→naranja
//   75% → naranja total · 75–100% → degradado naranja→rojo
//   100% (deadline) → rojo.
// ─────────────────────────────────────────────────────────
function lerpColor(a, b, k) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const c = pa.map((v,i) => Math.round(v + (pb[i]-v)*k));
  return 'rgb(' + c.join(',') + ')';
}

function phase1Info(p, today) {
  if (phaseDone(p, 1)) return { done:true, t:1, fill:100, color:'#16a34a' };

  const start    = parseDate(p.fecha);          // alta del pedido
  const deadline = parseDate(p.deadlineF1);      // deadline de la fase
  if (!start || !deadline || deadline <= start) {
    return { done:false, t:0, fill:0, color:'#64748b' };
  }

  // Fracción de tiempo transcurrida (0..1)
  let t = (today - start) / (deadline - start);
  if (t < 0) t = 0;
  if (t > 1) t = 1;

  let color;
  if (t >= 1)         color = '#dc2626';                              // rojo (vencido)
  else if (t >= 0.75) color = lerpColor('#f97316', '#dc2626', (t-0.75)/0.25); // naranja → rojo
  else if (t >= 0.5)  color = lerpColor('#16a34a', '#f97316', (t-0.5)/0.25);  // verde → naranja
  else                color = '#16a34a';                              // verde

  return { done:false, t, fill: Math.round(t*100), color };
}

// ─────────────────────────────────────────────────────────
//  LÓGICA DE PROGRESO (4 fases × 25%)
// ─────────────────────────────────────────────────────────
function calcProgress(p) {
  const today = new Date(); today.setHours(0,0,0,0);
  let pct = 0;

  // Fase 1 — HERRAMIENTA + DOC: avance por tiempo (el spinner avanza por día).
  // Si está TERMINADO suma 25%; si no, suma la fracción de tiempo transcurrida.
  const f1Done = phaseDone(p, 1);
  if (f1Done) pct += 25;
  else        pct += 25 * phase1Info(p, today).t;

  // Fase 2 — ENVÍO: SIN ENVIAR=0 · PROGRAMADO=12.5 · EN TRÁNSITO=18.75 · ENTREGADO=25.
  // Solo suma si Fase 1 está completa (orden secuencial).
  const f2Done = phaseDone(p, 2);
  if (f1Done) pct += 25 * (statusFillPct(p.envio) / 100);

  // Fase 3 — PM Y CURSO: SIN PROGRAMAR=0 · PROGRAMADO=12.5 · EN PROCESO=18.75 · REALIZADO=25.
  // Solo suma si Fase 2 está entregada.
  const f3Done = phaseDone(p, 3);
  if (f2Done) pct += 25 * (statusFillPct(p.pm) / 100);

  // Fase 4 — ENCUESTA: el spinner sigue el fill del segmento (50% amarillo si
  // pendiente-activa, 100% si realizada/vencida). Solo se activa si PM está realizado.
  const f4Done = phaseDone(p, 4);
  if (f3Done) pct += 25 * (segment4Info(p, today).fill / 100);

  // Fase actual = primera incompleta
  let currentPhase;
  if (!f1Done)      currentPhase = 1;
  else if (!f2Done) currentPhase = 2;
  else if (!f3Done) currentPhase = 3;
  else              currentPhase = 4;

  return { pct: Math.round(Math.min(pct, 100)), currentPhase };
}

function phaseStyle(phase) {
  const map = {
    1: { color: '#8b5cf6', label: 'Herramienta + Doc' },
    2: { color: '#ea580c', label: 'Envío y descarga' },
    3: { color: '#16a34a', label: 'PM y curso' },
    4: { color: '#ca8a04', label: 'Encuesta / Cerrado' },
  };
  return map[phase] || map[1];
}

// ─────────────────────────────────────────────────────────
//  RENDER DE UNA TARJETA
// ─────────────────────────────────────────────────────────
function renderRow(p, colorIdx) {
  const { pct, currentPhase } = calcProgress(p);
  const phase      = phaseStyle(currentPhase);
  const orderColor = ORDER_COLORS[colorIdx % ORDER_COLORS.length];

  // Hoy a medianoche para comparar fechas sin afectar por la hora.
  const today = new Date(); today.setHours(0,0,0,0);

  // Relleno + color por segmento (4 fases). La caja siempre es gris;
  // solo el avance logrado (fill%) se pinta del color correspondiente.
  const f1 = phase1Info(p, today);
  const segments = [
    { fill: f1.fill, color: f1.color },
    segment23Info(p, 2, today),
    segment23Info(p, 3, today),
    segment4Info(p, today),
  ];

  // Clamp para que el spinner/máquina no salga de la barra
  const tipLeft = Math.max(3, Math.min(pct, 96));

  // Ícono flotante: camión durante Envío y descarga (Fase 2 en curso), máquina en el resto.
  const showTruck = (currentPhase === 2 && !phaseDone(p, 2));

  return `
    <div class="vslider-item" style="padding-bottom:6px">
      <div class="card rounded-xl px-3 py-1">

        <!-- Header de la tarjeta -->
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-4">
            <span class="text-2xl font-semibold text-white">#${p.id}</span>
            <span class="px-2 py-0.5 rounded text-sm font-medium bg-slate-700 text-slate-200">${p.vendedor}</span>
            ${p.cliente ? `<span class="text-base text-slate-200 font-medium">${p.cliente}</span>` : ''}
            <span class="text-sm text-slate-400">Alta: ${p.fecha}</span>
          </div>
          <span class="text-base font-medium" style="color:${phase.color}">${phase.label}</span>
        </div>

        <!-- Barra de progreso: 4 segmentos coloreados por estado de deadline -->
        <div style="padding-top:78px; padding-bottom:6px; position:relative">
          <div class="progress-track">

            ${segments.map(s => `
              <div class="phase-seg seg-gray">
                <div class="phase-seg-fill" style="width:${s.fill}%; background-color:${s.color}"></div>
              </div>
            `).join('')}

            <!-- Porcentaje dentro de la barra -->
            <span class="pct-label">${pct}%</span>

            <!-- Spinner girando en el extremo del avance -->
            <svg class="spinner-icon" style="left:${tipLeft}%; color:${orderColor}">
              <use href="#spinner-petals"/>
            </svg>

            <!-- Ícono flotante: camión (envío en curso) o máquina CNC (resto de fases) -->
            <div class="machine-icon" style="left:${tipLeft}%; color:${orderColor}">
              ${showTruck ? `<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAg0AAAEACAYAAAAwbkXXAAABSWlDQ1BJQ0MgUHJvZmlsZQAAKJF9kM9KAlEUhz/LGEihFi1atHBTEFiZSbU1iwokRIv+7MbRNBjtMk5Uux5Cgl4gegM3LXqEICioTes2LYLZlEznaqUVdQ+H33d/95zL4UBP2FTKDgKVqutklxciW9s7EeMJQyLEKIZp1VQyk0lLCZ/6/Xi3BLTeTOi/fr//e/oLxZol+iaZsJTjQiAmnDl0leYT4SFHhhKuay61+UJzvs2XrZr1bEr4WnjQKpsF4UfhaL7LL3VxxT6wPmbQ04eL1Y2c6LDkCIsskZaIkCPOnOQ0K6z90ZNo9aTYR3GMwx4lyrjSnRRHYVMUXqWKxSRR4TgxyVm965877Hi2gvkH6DnreNYzNDwY8Dve2JHcp+CqrkzH/NpswAvWdmfibQ41oO/U9182wRiH5p3vvzZ8v3kOvffS670DMNNdeEBKjzgAAABWZVhJZk1NACoAAAAIAAGHaQAEAAAAAQAAABoAAAAAAAOShgAHAAAAEgAAAESgAgAEAAAAAQAAAg2gAwAEAAAAAQAAAQAAAAAAQVNDSUkAAABTY3JlZW5zaG90hHW9xQAAAdZpVFh0WE1MOmNvbS5hZG9iZS54bXAAAAAAADx4OnhtcG1ldGEgeG1sbnM6eD0iYWRvYmU6bnM6bWV0YS8iIHg6eG1wdGs9IlhNUCBDb3JlIDYuMC4wIj4KICAgPHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj4KICAgICAgPHJkZjpEZXNjcmlwdGlvbiByZGY6YWJvdXQ9IiIKICAgICAgICAgICAgeG1sbnM6ZXhpZj0iaHR0cDovL25zLmFkb2JlLmNvbS9leGlmLzEuMC8iPgogICAgICAgICA8ZXhpZjpQaXhlbFlEaW1lbnNpb24+MjU2PC9leGlmOlBpeGVsWURpbWVuc2lvbj4KICAgICAgICAgPGV4aWY6UGl4ZWxYRGltZW5zaW9uPjUyNTwvZXhpZjpQaXhlbFhEaW1lbnNpb24+CiAgICAgICAgIDxleGlmOlVzZXJDb21tZW50PlNjcmVlbnNob3Q8L2V4aWY6VXNlckNvbW1lbnQ+CiAgICAgIDwvcmRmOkRlc2NyaXB0aW9uPgogICA8L3JkZjpSREY+CjwveDp4bXBtZXRhPgrDwu8DAABAAElEQVR4Aey9WZdk13Xnt+8Qc+RYWSOAQgEQAYIASRAkxVEUJZJStyS73e1eLXl5Lbc+RT/6I/jBy/ay3/zSbrenZbXVolqiKIqkQIIkOIEYSAwFFGqecow54l7//vtGJKqAjMhEJgqFqjqn6mZE3OHcc/YZ9v/s6UQ5yUIKFAgUCBQIFAgUCBQIFNiFAvEu18PlQIFAgUCBQIFAgUCBQAGnQAANoSMECgQKBAoECgQKBArsiQIBNOyJTOGmQIFAgUCBQIFAgUCBABpCHwgUCBQIFAgUCBQIFNgTBQJo2BOZwk2BAoECgQKBAoECgQIBNIQ+ECgQKBAoECgQKBAosCcKBNCwJzKFmwIFAgUCBQIFAgUCBQJoCH0gUCBQIFAgUCBQIFBgTxQIoGFPZAo3BQoECgQKBAoECgQKBNAQ+kCgQKBAoECgQKBAoMCeKBBAw57IFG4KFAgUCBQIFAgUCBQIoCH0gUCBQIFAgUCBQIFAgT1RIICGPZEp3BQoECgQKBAoECgQKBBAQ+gDgQKBAoECgQKBAoECe6JAAA17IlO4KVAgUCBQIFAgUCBQIICG0AcCBQIFAgUCBQIFAgX2RIEAGvZEpnBToECgQKBAoECgQKBAAA2hDwQKBAoECgQKBAoECuyJAgE07IlM4aZAgUC // ─────────────────────────────────────────────────────────
//  CONSTRUCCIÓN DEL DOM
// ─────────────────────────────────────────────────────────
function buildList(renderData) {
  document.getElementById('trackers').innerHTML =
    renderData.map((p, idx) => renderRow(p, idx % liveData.length)).join('');
}

// ─────────────────────────────────────────────────────────
//  RENDER PRINCIPAL + cálculo dinámico de tarjetas visibles
// ─────────────────────────────────────────────────────────
function renderTrackers() {
  if (!liveData.length) return;

  const list     = document.getElementById('trackers');
  const viewport = document.getElementById('vsliderViewport');

  // Paso 1 — render real (una sola copia) para medir altura de tarjeta.
  buildList(liveData);
  cardHeight = (list.children[0] && list.children[0].offsetHeight) || 300;

  // Paso 2 — cuántas caben en el espacio disponible de ventana.
  const available = viewport.getBoundingClientRect().height;
  VISIBLE_ROWS = Math.max(
    1,
    Math.min(liveData.length, Math.floor(available / cardHeight))
  );

  // Paso 3 — si hay más pedidos de los que caben, duplicamos la lista UNA
  // vez seguida de sí misma. Al desplazarse y llegar exactamente al alto de
  // la primera copia, restamos ese alto al scrollTop: como la segunda copia
  // es idéntica, el recorrido nunca se ve "reiniciar" — es un mismo lazo
  // continuo e infinito.
  const needsLoop = liveData.length > VISIBLE_ROWS;
  buildList(needsLoop ? [...liveData, ...liveData] : liveData);

  singleListHeight = needsLoop && list.children[liveData.length]
    ? list.children[liveData.length].offsetTop // medida real (incluye gaps)
    : 0;

  // Velocidad de lectura: 3.75 s por tarjeta (20% más rápido que el
  // ritmo base de 4.5 s) — sigue siendo cómodo para leer folio, cliente,
  // fase y fechas.
  const SECONDS_PER_CARD = 3.75;
  pxPerMs = cardHeight / (SECONDS_PER_CARD * 1000);

  viewport.scrollTop = 0;
  lastFrameTs = null;

  attachHoverPause(viewport);
}

// ─────────────────────────────────────────────────────────
//  AUTO-SCROLL CONTINUO (rAF) — se detiene solo con el cursor encima
// ─────────────────────────────────────────────────────────
let isHovering       = false;
let hoverDetectorAttached = false;

function attachHoverPause(viewport) {
  if (hoverDetectorAttached) return;
  hoverDetectorAttached = true;
  viewport.addEventListener('mouseenter', () => { isHovering = true; });
  viewport.addEventListener('mouseleave', () => {
    isHovering = false;
    lastFrameTs = null; // reanuda desde donde quedó, sin salto de tiempo
  });
}

// Un cuadro de animación = mover scrollTop una fracción de píxel según el
// tiempo real transcurrido (no un salto fijo), por eso el recorrido fluye
// sin pausas ni "pasos" perceptibles.
function autoScrollFrame(ts) {
  const viewport = document.getElementById('vsliderViewport');
  const active = viewport && !isHovering && liveData.length > VISIBLE_ROWS && singleListHeight > 0;

  if (active) {
    if (lastFrameTs != null) {
      // Límite de seguridad: si el navegador pausó un cuadro (pestaña en
      // segundo plano, hipo del sistema), evita que se interprete como un
      // salto grande — el recorrido sigue fluido en vez de brincar.
      const dt = Math.min(ts - lastFrameTs, 50);
      viewport.scrollTop += pxPerMs * dt;
      if (viewport.scrollTop >= singleListHeight) {
        viewport.scrollTop -= singleListHeight; // lazo infinito, sin reinicio visible
      }
    }
    lastFrameTs = ts;
  } else {
    lastFrameTs = null;
  }

  rafId = requestAnimationFrame(autoScrollFrame);
}

function startAutoScroll() {
  if (rafId) cancelAnimationFrame(rafId);
  lastFrameTs = null;
  rafId = requestAnimationFrame(autoScrollFrame);
}

// ─────────────────────────────────────────────────────────
//  KPIs
// ─────────────────────────────────────────────────────────
function updateKPIs() {
  const total   = liveData.length;
  const avgPct  = total
    ? Math.round(liveData.reduce((s, p) => s + calcProgress(p).pct, 0) / total)
    : 0;
  const inPM    = liveData.filter(p =>
    p.pm === 'PROGRAMADO' || p.pm === 'EN PROCESO' || p.pm === 'TERMINADO' || p.pm === 'COMPLETADO' || p.pm === 'REALIZADO'
  ).length;
  const pendEnc = liveData.filter(p =>
    !p.encuesta || p.encuesta === 'PENDIENTE' || p.encuesta === '-'
  ).length;

  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-avg').textContent   = avgPct + '%';
  document.getElementById('kpi-pm').textContent    = inPM;
  document.getElementById('kpi-enc').textContent   = pendEnc;
}

// ─────────────────────────────────────────────────────────
//  COUNTDOWN Y REFRESCO AUTOMÁTICO
// ─────────────────────────────────────────────────────────
function tickCountdown() {
  countdownVal--;
  document.getElementById('countdown').textContent = countdownVal;
  if (countdownVal <= 0) refreshData();
}

function refreshData() {
  countdownVal = 120;
  document.getElementById('countdown').textContent = 120;
  document.getElementById('lastUpdate').textContent =
    new Date().toLocaleTimeString('es-MX');
  hideStatus();

  fetchData(pedidos => {
    // Auto-ocultar pedidos 100% completados 3 días después de la fecha de
    // resultado de encuesta (cierre total del pedido). Si el Sheet no trae
    // esa fecha, getClosedDate cuenta desde el primer día que se detectó
    // completo (ver comentario en su definición).
    const today = new Date(); today.setHours(0,0,0,0);
    liveData = pedidos.filter(p => {
      const allDone = phaseDone(p, 1) && phaseDone(p, 2) && phaseDone(p, 3) && phaseDone(p, 4);
      if (!allDone) return true;
      const closedAt = getClosedDate(p, today);
      const hideAfter = new Date(closedAt);
      hideAfter.setDate(hideAfter.getDate() + 3);
      return today <= hideAfter;
    });

    if (!liveData.length) {
      showStatus(
        'No se encontraron pedidos. ' +
        'Verifica que el Sheet esté publicado como CSV y que la URL sea correcta.'
      );
      return;
    }

    renderTrackers();
    updateKPIs();
    startAutoScroll();
  });
}

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function showStatus(msg) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideStatus() {
  document.getElementById('statusMsg').classList.add('hidden');
}

// ─────────────────────────────────────────────────────────
//  INICIALIZACIÓN
// ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderTrackers();
  startAutoScroll();
});

refreshData();                        // primera carga inmediata
setInterval(tickCountdown, 1000);    // contador regresivo
// Re-calcular VISIBLE_ROWS después de que estilos carguen completamente
setTimeout(() => { renderTrackers(); startAutoScroll(); }, 300);
</script>
